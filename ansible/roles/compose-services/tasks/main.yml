---
- name: Select compose files to deploy
  ansible.builtin.set_fact:
    compose_files_to_deploy: "{{ compose_stack_file_names if compose_deployment_mode == 'swarm' else compose_file_names }}"
    compose_stack_paths: "{{ compose_stack_file_names | map('regex_replace', '^(.*)$', '/opt/\\1') | list }}"

- name: Require vault-provided secrets
  vars:
    required_secrets_common:
      - db_password
      - authelia_db_password
      - forgejo_admin_password
      - forgejo_oidc_client_secret
      - forgejo_lfs_jwt_secret
      - forgejo_secret_key
      - forgejo_internal_token
      - authelia_session_secret
      - authelia_encryption_key
      - authelia_admin_password_hash
      - authelia_user1_password_hash
      - authelia_oidc_private_key
    required_secrets_swarm:
      - grafana_admin_password
      - grafana_oidc_client_secret
    required_secrets: "{{ required_secrets_common + (required_secrets_swarm if compose_deployment_mode == 'swarm' else []) }}"
  ansible.builtin.assert:
    that:
      - vars[item] is defined
      - (vars[item] | string | trim) != ""
      - not ((vars[item] | string) is match('^CHANGE_ME'))
    fail_msg: "Missing secret '{{ item }}'. Define it in encrypted group_vars/vault.yml and run with USEVAULT=1."
  loop: "{{ required_secrets }}"

- name: Copy compose files to remote host
  ansible.builtin.template:
    src: "{{ item }}"
    dest: "/opt/{{ item }}"
  loop: "{{ compose_files_to_deploy }}"

- name: Undeploy compose
  community.docker.docker_compose_v2:
    project_name: vcc
    project_src: /opt/
    files: "{{ compose_files_to_deploy }}"
    remove_volumes: true
    state: absent
  when:
    - compose_deployment_mode != 'swarm'
    - compose_recreate

- name: Undeploy swarm stack
  community.docker.docker_stack:
    name: vcc
    state: absent
  when:
    - compose_deployment_mode == 'swarm'
    - compose_recreate
    - inventory_hostname == groups['targets'][0]

- name: Delete directories in {{ data_dir }}
  ansible.builtin.file:
    path: "{{ data_dir }}/{{ item }}"
    state: absent
  loop: "{{ compose_data_directories + (['configs'] if compose_nuke_config_directories else []) }}"
  when: compose_nuke_data_directories

- name: Create data directories in {{ data_dir }}
  ansible.builtin.file:
    path: "{{ data_dir }}/{{ item }}"
    state: directory
  loop: "{{ compose_data_directories }}"

- name: Create config directories in {{ data_dir }}/configs
  ansible.builtin.file:
    path: "{{ data_dir }}/configs/{{ item }}"
    state: directory
    mode: "0755"
  loop: "{{ compose_config_directories }}"

- name: Find template files in compose config directories
  ansible.builtin.find:
    paths: "{{ role_path }}/templates/configs/{{ item }}"
    file_type: file
    recurse: true
  loop: "{{ compose_config_directories }}"
  register: template_files_raw
  delegate_to: localhost
  become: false
  changed_when: false
  failed_when: false

- name: Flatten template file list
  ansible.builtin.set_fact:
    template_files: "{{ template_files_raw.results | default([]) | selectattr('files', 'defined') | map(attribute='files') | list | flatten }}"

- name: Template configuration files
  ansible.builtin.template:
    src: "{{ item.path }}"
    dest: "{{ data_dir }}/configs/{{ item.path | regex_replace('^.*/configs/', '') }}"
  loop: "{{ template_files | default([]) }}"
  loop_control:
    label: "{{ item.path }}"

- name: Create and start services
  community.docker.docker_compose_v2:
    project_name: vcc
    project_src: /opt/
    files: "{{ compose_files_to_deploy }}"
    state: present
  retries: 3
  delay: 1
  register: result
  until: result is not failed
  when: compose_deployment_mode != 'swarm'

- name: Deploy stack services (swarm mode)
  community.docker.docker_stack:
    name: vcc
    compose: "{{ compose_stack_paths }}"
    state: present
  when:
    - compose_deployment_mode == 'swarm'
    - inventory_hostname == groups['targets'][0]
  retries: 3
  delay: 1
  register: swarm_result
  until: swarm_result is not failed
