server:
  address: "tcp://0.0.0.0:9091"

log:
  level: info

authentication_backend:
  password_reset:
    disable: true
  file:
    path: /config/users.yml

session:
  secret: "{{ lookup('password', '/dev/null', length=64) }}"
  cookies:
    - name: authelia_session
      domain: {{ domain_name }}
      authelia_url: https://auth.{{ domain_name }}
{% if compose_deployment_mode == 'swarm' %}
  # Redis is used in Swarm mode to share sessions across replicas.
  redis:
    host: redis
    port: 6379
    database_index: 0
{% endif %}
     
access_control:
  default_policy: deny
  rules:
    - domain: auth.{{ domain_name }}
      policy: one_factor

identity_providers:
  oidc:
    jwks:
      - algorithm: RS256
        # openssl genpkey -algorithm RSA -pkeyopt rsa_keygen_bits:4096 -out oidc.key
        key: |
{{ authelia_oidc_private_key | indent(10, true) }}
    clients:
# TODO: generate all OIDC clients using authelia_oidc_clients variable
{% for c in authelia_oidc_clients %}
      - id: "{{ c.id }}"
        description: "{{ c.id }} oidc client"
        secret: "{{ c.secret }}"
        public: {{ c.public | bool }}
        authorization_policy: "{{ c.authorization_policy }}"
        token_endpoint_auth_method: "{{ c.token_endpoint_auth_method }}"
        redirect_uris:
{% for u in c.redirect_uris %}
          - "{{ u }}"
{% endfor %}
        scopes:
{% for s in c.scopes %}
          - "{{ s }}"
{% endfor %}
{% endfor %}

storage:
  # local: 
  #   path: /config/db.sqlite3
  postgres:
    # tcp://db:5432 points to the Postgres service inside the compose network.
    address: 'tcp://db:5432' # TODO: add the Postgres service hostname and port
    database: {{ authelia_db }}
    schema: public
    username: {{ authelia_db_user }}
    password: {{ authelia_db_password }}
    timeout: 5s
  encryption_key: "{{ lookup('password', '/dev/null', length=64) }}"

notifier:
  disable_startup_check: true
  filesystem:
    filename: /config/notification.txt
