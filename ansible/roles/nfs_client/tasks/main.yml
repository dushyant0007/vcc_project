---
# TODO: implement the tasks for NFS client setup. Make sure to use the storage network for NFS mount

- name: Resolve data mount directory variable
  ansible.builtin.set_fact:
    nfs_mount_dir: "{{ data | default(data_dir) }}"
  # The assignment text mentions "data"; this keeps compatibility with data_dir in the template.

- name: "Create NFS share directory"
  ansible.builtin.file:
    path: "{{ nfs_mount_dir }}"
    state: directory
    mode: "0755"

- name: Install NFS client
  ansible.builtin.apt:
    name: nfs-common
    state: present
    update_cache: true

- name: Mount NFS share
# use storage network for NFS mount
  ansible.posix.mount:
    path: "{{ nfs_mount_dir }}"
    src: "storage.{{ domain_name }}:{{ nfs_dir }}"
    fstype: nfs
    opts: rw,_netdev
    state: mounted

## check mount
- block:
  - name: Get mount information
    ansible.builtin.command: cat /proc/mounts
    register: mounts_out
    changed_when: false
  - name: Assert NFS share is mounted via storage network
    ansible.builtin.assert:
      that:
        - mounts_out.stdout is search('storage\\.' ~ domain_name | regex_escape ~ ':' ~ nfs_dir | regex_escape ~ '.*' ~ nfs_mount_dir | regex_escape ~ '.*clientaddr=' ~ storage_IP | regex_escape ~ '.*')
      fail_msg: "NFS share not mounted correctly"
  when: enable_asserts
