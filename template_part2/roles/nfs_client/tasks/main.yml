---
- name: "Create NFS mount directory"
  ansible.builtin.file:
    path: "{{ data_dir }}"
    state: directory
    mode: "0755"

- name: Install NFS client
  ansible.builtin.apt:
    name: nfs-common
    state: present
    update_cache: true

- name: Mount NFS share
  ansible.posix.mount:
    path: "{{ data_dir }}"
    src: "storage.{{ domain_name }}:{{ nfs_dir }}"
    fstype: nfs
    opts: defaults,_netdev
    state: mounted

## check mount
- block:
  - name: Get mount information
    ansible.builtin.command: cat /proc/mounts
    register: mounts_out
    changed_when: false
  - ansible.builtin.assert:
      that:
        - mounts_out.stdout is search('storage\\.' ~ domain_name | regex_escape ~ ':' ~ nfs_dir | regex_escape ~ '.*' ~ data_dir | regex_escape ~ '.*clientaddr=' ~ storage_IP | regex_escape ~ '.*')
      fail_msg: "NFS share not mounted correctly"
  when: enable_asserts
