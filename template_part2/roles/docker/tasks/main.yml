---
# tasks file for roles/docker

- name: Install Docker packages
  ansible.builtin.apt:
    name:
      - docker.io
      - docker-compose-v2
      - python3-docker
    state: present
    update_cache: true

- name: Ensure docker service is enabled and running
  ansible.builtin.service:
    name: docker
    state: started
    enabled: true

- name: Add ansible user to docker group
  ansible.builtin.user:
    name: "{{ ansible_user | default('vagrant') }}"
    groups: docker
    append: true

- name: Check if docker command exists
  ansible.builtin.shell: "command -v docker"
  register: docker_check
  changed_when: false
  failed_when: false

- name: Assert docker is installed
  ansible.builtin.assert:
    that:
      - docker_check.rc == 0
    fail_msg: "Docker is not installed on this host."
